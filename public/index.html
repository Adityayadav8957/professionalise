<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RantWash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="page">
      <header>
        <div class="logo">🧼 Corpify</div>
        <p>Turn everyday frustration into polished corporate language.</p>
      </header>

      <div class="card">
        <!-- Chips -->
        <div class="chips">
          <button
            class="chip"
            data-text="My boss has no idea what they're doing and somehow I'm the one fixing everything"
          >
            Boss is clueless 🤦‍♂️
          </button>

          <button
            class="chip"
            data-text="This meeting was completely useless and could have been a two-line message"
          >
            Useless meeting 😤
          </button>

          <button
            class="chip"
            data-text="I genuinely have no idea what I'm doing and I'm just hoping no one notices"
          >
            Faking it daily 😅
          </button>

          <button
            class="chip"
            data-text="Someone literally took my work, changed nothing, and got credit for it"
          >
            Stole my work 🐍
          </button>

          <button
            class="chip"
            data-text="This deadline makes zero sense and there's no way this can be done properly"
          >
            Deadline is a joke 🔥
          </button>
        </div>

        <div class="divider"></div>

        <!-- Input -->
        <div class="field">
          <label class="field-label">Your raw thought</label>
          <textarea
            id="inputText"
            placeholder="e.g. My boss is an idiot and I can't take it anymore..."
            maxlength="500"
            rows="4"
          ></textarea>
          <div class="char-count"><span id="charCount">0</span> / 500</div>
        </div>

        <!-- Slider -->
        <div class="field">
          <div class="slider-header">
            <label class="field-label">Formality level</label>
            <span class="level-pill" id="levelPill">Business Formal</span>
          </div>
          <div class="slider-track">
            <span class="slider-emoji">😐</span>
            <input
              type="range"
              id="formalitySlider"
              min="1"
              max="5"
              value="2"
              step="1"
            />
            <span class="slider-emoji">🤣</span>
          </div>
          <div class="slider-ticks">
            <span>Professional</span>
            <span>Business Formal</span>
            <span>Corporate</span>
            <span>LinkedIn Guru</span>
            <span>Overlord</span>
          </div>
        </div>

        <!-- Button -->
        <button class="btn" id="translateBtn">
          <span id="btnText">🧼 Wash My Rant</span>
        </button>

        <!-- Output -->
        <div class="output-wrap" id="outputWrap">
          <div class="output-header">
            <label class="field-label">Result</label>
            <span class="badge" id="resultBadge"></span>
          </div>
          <div class="output-box" id="outputBox">
            <p class="placeholder-text" id="placeholder">
              Your professional version will appear here...
            </p>
            <p class="result-text" id="resultText"></p>
          </div>
          <button class="copy-btn" id="copyBtn" style="display: none">
            <svg
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              />
            </svg>
            <span id="copyText">Copy</span>
          </button>
        </div>

        <!-- Error -->
        <div class="error" id="errorCard" style="display: none">
          ⚠️ <span id="errorText"></span>
        </div>
      </div>

      <footer>RantWash — turning unhinged into unbothered since 2026 🧼</footer>
    </div>

    <script src="/js/main.js"></script>
  </body>
</html>
